# Elastic APM Server Configuration
# PyLadies Seoul Project

apm-server:
  # Host and port configuration
  host: "0.0.0.0:8200"
  
  # Maximum request size (default: 1048576 bytes = 1MB)
  max_request_size: 1048576
  
  # Read timeout
  read_timeout: 30s
  
  # Write timeout
  write_timeout: 30s
  
  # Maximum event size (default: 307200 bytes)
  max_event_size: 307200
  
  # Maximum number of events per request
  max_events_per_request: 100
  
  # Capture personal data
  capture_personal_data: false
  
  # Response headers
  response_headers:
    X-My-Header: "PyLadies Seoul APM"
  
  # CORS configuration
  cors:
    enabled: true
    allow_origins: 
      - "https://pyladiesseoul.org"
      - "https://www.pyladiesseoul.org"
      - "https://staging.pyladiesseoul.org"
    allow_methods: ["POST", "GET"]
    allow_headers: ["Content-Type", "Accept", "Authorization"]
    allow_credentials: false
    max_age: 300
  
  # RUM configuration
  rum:
    enabled: true
    event_rate:
      limit: 1000
      lru_size: 1000
    allow_origins: 
      - "https://pyladiesseoul.org"
      - "https://www.pyladiesseoul.org"
    library_pattern: "node_modules|bower_components|~"
    exclude_from_grouping: "^/webpack"
    
    # Source map configuration
    source_mapping:
      enabled: true
      cache:
        expiration: 5m
      index_pattern: "apm-*-sourcemap*"
  
  # Authentication
  auth:
    # Secret token for authentication
    secret_token: ${ELASTIC_APM_SECRET_TOKEN}
    
    # Anonymous authentication
    anonymous:
      enabled: false
      allow_agent: []
      allow_service: []
      rate_limit:
        ip_limit: 1000
        event_limit: 300

# Output configuration
output.elasticsearch:
  hosts: ${ELASTICSEARCH_HOSTS:["localhost:9200"]}
  protocol: "https"
  
  # Authentication
  username: ${ELASTICSEARCH_USERNAME:""}
  password: ${ELASTICSEARCH_PASSWORD:""}
  
  # Index settings
  index: "apm-%{[observer.version]}-%{+yyyy.MM.dd}"
  
  # Template settings
  template:
    enabled: true
    pattern: "apm-*"
    settings:
      index:
        number_of_shards: 1
        number_of_replicas: 1
        refresh_interval: "5s"
        codec: best_compression
        mapping:
          total_fields:
            limit: 10000
  
  # ILM Policy
  ilm:
    enabled: true
    rollover_alias: "apm-data"
    pattern: "{now/d}-000001"
    policy: |
      {
        "policy": {
          "phases": {
            "hot": {
              "actions": {
                "rollover": {
                  "max_size": "50gb",
                  "max_age": "30d"
                },
                "set_priority": {
                  "priority": 100
                }
              }
            },
            "warm": {
              "min_age": "30d",
              "actions": {
                "set_priority": {
                  "priority": 50
                },
                "allocate": {
                  "number_of_replicas": 0
                }
              }
            },
            "delete": {
              "min_age": "90d"
            }
          }
        }
      }

# Alternative: Output to Logstash
# output.logstash:
#   hosts: ["logstash:5044"]

# Alternative: Output to file for development
# output.file:
#   path: "/tmp/apm-server"
#   filename: "apm-server"
#   rotate_every_kb: 10000
#   number_of_files: 5

# Logging configuration
logging:
  level: info
  to_files: true
  files:
    path: /var/log/apm-server
    name: apm-server
    keepfiles: 7
    permissions: 0644
    rotateeverybytes: 10485760 # 10MB
  
  # Structured logging
  json: true
  
  # Log to stderr
  to_stderr: false
  
  # Metrics logging
  metrics:
    enabled: true
    period: 30s

# Monitoring configuration
monitoring:
  enabled: true
  
  # Elasticsearch monitoring
  elasticsearch:
    hosts: ${ELASTICSEARCH_HOSTS:["localhost:9200"]}
    username: ${ELASTICSEARCH_USERNAME:""}
    password: ${ELASTICSEARCH_PASSWORD:""}
  
  # Cluster UUID
  cluster_uuid: ${ELASTICSEARCH_CLUSTER_UUID:""}

# HTTP endpoint for health checks
http:
  enabled: true
  host: "0.0.0.0"
  port: 5066
  
  # Health check endpoint
  pprof:
    enabled: false

# Instrumentation configuration
instrumentation:
  enabled: true
  environment: ${ENVIRONMENT:production}
  
  # Profiling
  profiling:
    cpu:
      enabled: true
      interval: 10s
      duration: 10s
    heap:
      enabled: true
      interval: 60s

# Processor configuration
processors:
  # Add cloud metadata
  - add_cloud_metadata: ~
  
  # Add Docker metadata
  - add_docker_metadata:
      host: "unix:///var/run/docker.sock"
  
  # Add host metadata
  - add_host_metadata:
      when:
        not:
          contains:
            tags: forwarded
  
  # Add process metadata
  - add_process_metadata:
      match_pids: [system.process.ppid]
      target: system.process.parent
  
  # User agent processor
  - add_user_agent:
      field: user_agent.original
      target: user_agent
  
  # GeoIP processor
  - add_locale:
      field: source.ip
      target: source.geo

# Memory management
max_procs: 4
gc_percent: 100

# Queue configuration
queue:
  mem:
    events: 8192
    flush:
      min_events: 1024
      timeout: 1s
# Security Headers Configuration
# PyLadies Seoul Project

# Hide server information
server_tokens off;
more_set_headers 'Server: PyLadies-Seoul';

# Security Headers
more_set_headers 'X-Frame-Options: SAMEORIGIN';
more_set_headers 'X-Content-Type-Options: nosniff';
more_set_headers 'X-XSS-Protection: 1; mode=block';
more_set_headers 'Referrer-Policy: strict-origin-when-cross-origin';

# Permissions Policy (formerly Feature Policy)
more_set_headers 'Permissions-Policy: geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), ambient-light-sensor=(), autoplay=(), battery=(), display-capture=(), document-domain=(), encrypted-media=(), fullscreen=(self), gamepad=(), midi=(), payment=(), picture-in-picture=(), screen-wake-lock=(), web-share=(), xr-spatial-tracking=()';

# Content Security Policy (CSP)
# This is a base policy - you may need to adjust based on your application needs
more_set_headers 'Content-Security-Policy: default-src "self"; script-src "self" "unsafe-inline" https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src "self" "unsafe-inline" https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src "self" https://fonts.gstatic.com; img-src "self" data: https:; connect-src "self"; frame-ancestors "none"; base-uri "self"; form-action "self"; upgrade-insecure-requests';

# Expect-CT (Certificate Transparency)
more_set_headers 'Expect-CT: max-age=86400, enforce';

# DNS Prefetch Control
more_set_headers 'X-DNS-Prefetch-Control: off';

# Disable MIME sniffing
more_set_headers 'X-Content-Type-Options: nosniff';

# Prevent page from being displayed in a frame (clickjacking protection)
more_set_headers 'X-Frame-Options: DENY';

# XSS Protection
more_set_headers 'X-XSS-Protection: 1; mode=block';

# Remove potentially dangerous headers
more_clear_headers 'X-Powered-By';
more_clear_headers 'X-AspNet-Version';
more_clear_headers 'X-AspNetMvc-Version';
more_clear_headers 'X-Runtime';
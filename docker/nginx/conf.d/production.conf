# Production HTTPS Server Configuration
# PyLadies Seoul Project

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ${DOMAIN_NAME} ${WWW_DOMAIN_NAME};

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/${DOMAIN_NAME}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN_NAME}/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/${DOMAIN_NAME}/chain.pem;

    # SSL Security Settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Modern SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;

    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=()" always;

    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Client Settings
    client_max_body_size 20M;
    client_body_timeout 30s;
    client_header_timeout 30s;

    # Proxy Settings
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    proxy_buffering on;
    proxy_buffer_size 8k;
    proxy_buffers 8 8k;
    proxy_busy_buffers_size 16k;

    # Static Files with Long Cache
    location /static/ {
        alias /app/static/;
        expires 1M;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        
        # Rate limiting for static files
        limit_req zone=static burst=50 nodelay;
        
        # Serve pre-compressed files if available
        gzip_static on;
        brotli_static on;
        
        # Security for static files
        location ~* \.(php|py|pl|sh|rb|js\.map|css\.map)$ {
            deny all;
            return 404;
        }

        # Font files CORS
        location ~* \.(woff|woff2|eot|ttf|otf)$ {
            add_header Access-Control-Allow-Origin "*";
            expires 1M;
            add_header Cache-Control "public, immutable";
        }

        # Images optimization headers
        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif)$ {
            expires 1M;
            add_header Cache-Control "public, immutable";
            add_header Vary "Accept-Encoding";
        }
    }

    # Media Files with Moderate Cache
    location /media/ {
        alias /app/media/;
        expires 1w;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
        
        # Security for uploaded files
        location ~* \.(php|py|pl|sh|rb|html|htm|js)$ {
            deny all;
            return 403;
        }

        # Prevent execution of uploaded scripts
        location ~ \.(php|py|pl|cgi|sh|rb)$ {
            return 403;
        }
    }

    # Admin Interface with Strong Rate Limiting
    location /admin/ {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;
        
        # Additional security headers for admin
        add_header X-Frame-Options "DENY" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" always;
        
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;
    }

    # API Endpoints with Rate Limiting
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        
        # CORS headers for API (if needed)
        add_header Access-Control-Allow-Origin "https://${DOMAIN_NAME}" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;
        
        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Max-Age 86400;
            add_header Content-Type 'text/plain charset=UTF-8';
            add_header Content-Length 0;
            return 204;
        }
        
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;
    }

    # Health Check Endpoint (no logging)
    location /health/ {
        proxy_pass http://django_backend;
        access_log off;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # robots.txt
    location /robots.txt {
        alias /app/static/robots.txt;
        expires 1d;
        add_header Cache-Control "public";
        access_log off;
    }

    # sitemap.xml
    location /sitemap.xml {
        proxy_pass http://django_backend;
        expires 1d;
        add_header Cache-Control "public";
    }

    # Favicon
    location /favicon.ico {
        alias /app/static/img/favicon.ico;
        expires 1M;
        add_header Cache-Control "public";
        access_log off;
    }

    # Well-known URIs (for Let's Encrypt, etc.)
    location /.well-known/ {
        root /var/www/certbot;
        access_log off;
    }

    # Main Application with General Rate Limiting
    location / {
        limit_req zone=general burst=10 nodelay;
        
        # Cache HTML pages briefly
        proxy_cache_bypass $http_pragma;
        proxy_cache_revalidate on;
        proxy_cache_min_uses 1;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        
        proxy_pass http://django_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;
    }

    # Block access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }
    
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    location ~ \.(sql|log|conf|ini|sh|py)$ {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    # Block common exploit attempts
    location ~ /(wp-|wordpress|phpmyadmin|admin|xmlrpc) {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    # Error pages
    error_page 400 401 403 404 /40x.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /40x.html {
        root /usr/share/nginx/html;
        internal;
    }
    
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
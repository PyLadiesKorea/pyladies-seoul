services:

  # Django Application - Staging
  web2:
    build:
      context: .
      target: production
    container_name: pyladies_seoul_web_staging
    restart: unless-stopped
    env_file:
      - .env.staging
    volumes:
      - db_volume_staging:/app/db
      - media_volume_staging:/app/media
      - static_volume_staging:/app/static
    user: "1000:1000"
    ports:
      - "8001:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.staging
    networks:
      - frontend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # Nginx for Staging
  nginx2:
    image: nginx:alpine
    container_name: pyladies_seoul_nginx_staging
    restart: unless-stopped
    ports:
      - "81:80"
    volumes:
      - ./docker/nginx/staging.conf:/etc/nginx/conf.d/default.conf:ro
      - media_volume_staging:/app/media:ro
      - static_volume_staging:/app/static:ro
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME:-localhost}
    depends_on:
      - web2
    networks:
      - frontend

volumes:
  db_volume_staging:
    driver: local
  media_volume_staging:
    driver: local
  static_volume_staging:
    driver: local

networks:
  frontend:
    driver: bridge
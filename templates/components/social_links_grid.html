{% comment %}
Social Links Grid Component
Usage: {% include "components/social_links_grid.html" with social_links=social_links %}
{% endcomment %}

{% if social_links %}
    <div class="sns-links">
        {% for link in social_links %}
            <a href="{{ link.full_url }}" target="_blank" rel="noopener noreferrer" 
               class="sns-link" title="{{ link.platform.name }}"
               {% if link.platform.color %}data-color="{{ link.platform.color }}"{% endif %}>
                <i class="{{ link.platform.icon_class }}"></i>
            </a>
        {% endfor %}
    </div>
{% else %}
    <div class="sns-links">
        <p>SNS 링크가 준비 중입니다.</p>
    </div>
{% endif %}

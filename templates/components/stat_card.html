{% comment %}
Stat Card Component
Usage: {% include "components/stat_card.html" with icon="fas fa-users" number="500+" text="Community Members" %}
{% endcomment %}

<div class="card border-0 h-100">
    <div class="card-body">
        <i class="{{ icon }} fa-3x mb-3 stat-icon"></i>
        <h3 class="fw-bold stat-number">{{ number }}</h3>
        <p class="stat-text">{{ text }}</p>
    </div>
</div>

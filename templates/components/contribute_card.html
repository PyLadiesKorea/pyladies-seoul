{% comment %}
Contribute Card Component
Usage: {% include "components/contribute_card.html" with method=method %}
{% endcomment %}

<div class="contribute-card">
    <div class="contribute-icon">
        <i class="{{ method.icon_class }}"></i>
    </div>
    <h3 class="contribute-title highlighter-effect">{{ method.title }}</h3>
    <p class="contribute-description">{{ method.description }}</p>
    {% if method.link_url %}
        <a href="{{ method.link_url }}" class="contribute-link" target="_blank" rel="noopener noreferrer">{{ method.link_text }}</a>
    {% else %}
        <a href="#" class="contribute-link">{{ method.link_text }}</a>
    {% endif %}
</div>

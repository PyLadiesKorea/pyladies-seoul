services:

  # Django Application - Production
  web:
    build:
      context: .
      target: production
    container_name: pyladies_seoul_web_prod
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - media_volume:/app/media
      - static_volume:/app/static
      - log_volume:/app/logs
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    secrets:
      - django_secret_key
      - django_superuser_password
      - aws_secret_key
    networks:
      - frontend
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  # Nginx Reverse Proxy with SSL
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile.prod
    container_name: pyladies_seoul_nginx_prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - media_volume:/app/media:ro
      - static_volume:/app/static:ro
      - log_volume:/var/log/nginx
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME:-pyladiesseoul.org}
      - WWW_DOMAIN_NAME=${WWW_DOMAIN_NAME:-www.pyladiesseoul.org}
    depends_on:
      - web
    networks:
      - frontend

  # Certbot for SSL Certificate Management
  certbot:
    image: certbot/certbot:latest
    container_name: pyladies_seoul_certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
      - log_volume:/var/log/certbot
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME:-pyladiesseoul.org}
      - WWW_DOMAIN_NAME=${WWW_DOMAIN_NAME:-www.pyladiesseoul.org}
      - CERTBOT_EMAIL=${CERTBOT_EMAIL:-admin@pyladiesseoul.org}
    command: >
      sh -c "
        while :; do
          certbot renew --quiet --webroot --webroot-path=/var/www/certbot
          sleep 12h
        done
      "
    networks:
      - frontend
    depends_on:
      - nginx

# Docker Secrets for Production
secrets:
  django_secret_key:
    file: ./secrets/django_secret_key.txt
  django_superuser_password:
    file: ./secrets/django_superuser_password.txt
  aws_secret_key:
    file: ./secrets/aws_secret_key.txt

# Named Volumes for Persistence
volumes:
  media_volume:
    driver: local
  static_volume:
    driver: local
  log_volume:
    driver: local
  certbot_conf:
    driver: local
  certbot_www:
    driver: local

# Production Networks
networks:
  frontend:
    driver: bridge